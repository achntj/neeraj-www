name: Publish newsletter

on:
  push:
    branches: [main]
    paths:
      - "content/blog/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-new-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Find newly added posts
        id: posts
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(git diff --diff-filter=A --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'content/blog/*.md' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Send new posts through Buttondown
        if: steps.posts.outputs.files != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/send-buttondown-post.mjs ${{ steps.posts.outputs.files }}
