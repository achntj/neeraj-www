backend:
  name: github
  repo: achntj/neeraj-www
  branch: main
  base_url: https://www.neerajkjha.com
  commit_messages:
    create: "Create {{collection}}: {{slug}}"
    update: "Update {{collection}}: {{slug}}"
    delete: "Delete {{collection}}: {{slug}}"
    uploadMedia: "Upload media: {{path}}"
    deleteMedia: "Delete media: {{path}}"

local_backend: true

media_folder: "public/images/blog"
public_folder: "/images/blog"

site_url: "https://www.neerajkjha.com"
display_url: "https://www.neerajkjha.com"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{title}} - {{date}}"
    preview_path: "blog/{{slug}}"
    sortable_fields: ["date", "title", "category"]
    view_groups:
      - label: "Category"
        field: "category"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        hint: "A short one-sentence summary shown on the blog list and article page."
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - label: "Category"
        name: "category"
        widget: "string"
        default: "Opinion"
      - label: "Body"
        name: "body"
        widget: "markdown"
